name: hello-mery
steps:
  - states: ["0", "1"]
    actions:
      - actor: vars
        method: get
        arguments: "name"
      - actor: this
        method: putJson
        arguments:
          path: name
          value: "${result}"

  - states: ["1", "end"]
    actions:
      - actor: ROOT
        method: print
        arguments: "Hello, ${name}!"
